<!DOCTYPE html>
<html>
<head>
    <style>
        .background-image {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-image: url('your-image-url');
            background-size: cover;
        }

        .content {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="background-image"></div>
    <div class="content">
        <h1>实时模糊背景示例</h1>
        <p>这是一个使用CSS backdrop-filter属性实现实时模糊背景的示例。</p>
    </div>
</body>
</html>
